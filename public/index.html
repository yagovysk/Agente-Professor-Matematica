<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professor de Matematica</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Professor de Matematica</h1>
        <p class="subtitle">
          Pergunte sobre Bhaskara, equacoes, geometria e mais.
        </p>

        <div class="suggestions" id="suggestions"></div>

        <div class="chat" id="chat"></div>

        <form id="chat-form" class="chat-form">
          <textarea
            id="question"
            placeholder="Ex.: Me explica Bhaskara com um exemplo completo"
            required
          ></textarea>
          <button type="submit" id="send-btn">Perguntar</button>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
